server:
  port: 8082

spring:
  application:
    name: url-shortener-service
  cassandra:
    keyspace-name: url_shortener
    contact-points: localhost
    port: 9042
    local-datacenter: datacenter1
    schema-action: none
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true