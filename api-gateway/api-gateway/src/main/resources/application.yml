server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: token-service
            uri: lb://TOKEN-SERVICE
            predicates:
              - Path=/api/v1/token/**

          - id: url-shortener-service
            uri: lb://URL-SHORTENER-SERVICE
            predicates:
              - Path=/api/v1/**

eureka:
  client:
    registry-fetch-interval-seconds: 5
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
